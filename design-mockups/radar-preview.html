<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radar Scan Preview</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0b1022;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #eaf0ff;
  }

  .radar {
    position: relative;
    width: 280px;
    height: 280px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes spinReverse { to { transform: rotate(-360deg); } }

  .orbit {
    position: absolute;
    border-radius: 50%;
    border: 1px dashed rgba(255,255,255,0.08);
  }

  .orbit-1 {
    inset: 0;
    animation: spinReverse 100s linear infinite;
  }

  .orbit-2 {
    inset: 18%;
    animation: spin 60s linear infinite;
  }

  .orbit-3 {
    inset: 36%;
    border: 1px solid rgba(90,240,200,0.18);
  }

  .scan {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    background: conic-gradient(from 0deg, rgba(90,240,200,0.14), transparent 18%);
    animation: spin 6s linear infinite;
  }

  .core {
    position: absolute;
    width: 52%;
    height: 52%;
    top: 24%;
    left: 24%;
    border-radius: 50%;
    background: rgba(13,20,40,0.85);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(90,240,200,0.4);
    box-shadow: 0 0 48px rgba(90,240,200,0.22), inset 0 0 32px rgba(90,240,200,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 0 20px;
  }

  .node-name {
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: -0.3px;
    text-align: center;
    line-height: 1.3;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }

  .latency-box {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .latency {
    font-size: 28px;
    font-weight: 800;
    color: #5af0c8;
    letter-spacing: -1px;
    text-shadow: 0 0 20px rgba(90,240,200,0.6);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .latency-unit {
    font-size: 11px;
    font-weight: 700;
    color: #5af0c8;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    line-height: 1;
    padding-bottom: 2.4px;
  }

  .protocol {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #7d88a8;
    text-transform: uppercase;
    line-height: 1;
    opacity: 0.8;
  }
</style>
</head>
<body>
  <div class="radar">
    <div class="orbit orbit-1"></div>
    <div class="orbit orbit-2"></div>
    <div class="orbit orbit-3"></div>
    <div class="scan"></div>
    <div class="core">
      <div class="node-name">香港 IEPL · Premium 03</div>
      <div class="latency-box">
        <div class="latency">42</div>
        <div class="latency-unit">ms</div>
      </div>
      <div class="protocol">Hysteria2</div>
    </div>
  </div>
</body>
</html>
